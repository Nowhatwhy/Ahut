spring:
  application:
    name: Ahut
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/ahut?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

ahut:
  LOGIN_URL: "https://pay.ahut.edu.cn/Account/LoginService"
  LOGIN_PAGE_URL: "https://pay.ahut.edu.cn/Account/Login"
  VERIFY_URL: "https://pay.ahut.edu.cn/Account/VerifyCode"
  CHARGE_URL: "https://pay.ahut.edu.cn/Charge/GetIMS_AHUTService"
  PUBLIC_KEY: ""
  USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
  USERNAME: ${AHUT_USERNAME}
  PASSWORD: ${AHUT_PASSWORD}